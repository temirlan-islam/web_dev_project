<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="logo-text">TaskPro</span>
    </div>
    <nav class="nav-menu">
      <a class="nav-item" routerLink="/dashboard">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>
        Dashboard
      </a>
      <a class="nav-item" routerLink="/tasks">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        My Tasks
      </a>
      <a class="nav-item" routerLink="/tasks/new">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        New Task
      </a>
      <a class="nav-item active" routerLink="/search">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Search
      </a>
      <a class="nav-item" routerLink="/profile">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 18c0-3.5 3.1-5.5 7-5.5s7 2 7 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Profile
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="nav-item logout-btn" (click)="logout()">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M7 17H3a1 1 0 01-1-1V4a1 1 0 011-1h4M13 14l4-4-4-4M17 10H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <form class="search-form" (ngSubmit)="onSearch()">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5.5" stroke="#555" stroke-width="1.5"/><path d="M13.5 13.5L17 17" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" [(ngModel)]="query" name="q" placeholder="Search Google..." autofocus />
        <button type="submit" class="search-btn">Search</button>
      </form>
    </header>

    <div class="search-content">
      <div *ngIf="!searchUrl" class="search-empty">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="22" cy="22" r="14" stroke="#1a1a1a" stroke-width="3"/><path d="M32 32L44 44" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/></svg>
        </div>
        <h2>Search the web</h2>
        <p>Type your query and press Enter or click Search</p>
      </div>
      <iframe *ngIf="searchUrl" [src]="searchUrl" class="search-frame"></iframe>
    </div>
  </main>
</div>
