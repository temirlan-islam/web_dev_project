<div class="login-page">
  <div class="login-left">
    <div class="brand-content">
      <div class="brand-icon">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="16" fill="rgba(240,185,11,0.2)"/><path d="M18 28l7 7L38 21" stroke="#f0b90b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1>TaskPro</h1>
      <p class="brand-subtitle">The premium way to manage your tasks. Stay organized, stay productive.</p>
      <div class="brand-features">
        <div class="feature"><span class="feature-dot"></span> Smart task management</div>
        <div class="feature"><span class="feature-dot"></span> Priority & deadline tracking</div>
        <div class="feature"><span class="feature-dot"></span> Beautiful dashboard analytics</div>
        <div class="feature"><span class="feature-dot"></span> Category organization</div>
      </div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="login-subtitle">Sign in to your account</p>
      <form (ngSubmit)="onLogin()" class="login-form">
        <div class="field">
          <label>Username</label>
          <div class="input-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="7" r="3" stroke="#6b7294" stroke-width="1.5"/><path d="M3 17c0-3 2.7-5 6-5s6 2 6 5" stroke="#6b7294" stroke-width="1.5" stroke-linecap="round"/></svg>
            <input type="text" [(ngModel)]="username" name="username" placeholder="Enter username" />
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="4" y="8" width="10" height="8" rx="2" stroke="#6b7294" stroke-width="1.5"/><path d="M6 8V5a3 3 0 016 0v3" stroke="#6b7294" stroke-width="1.5" stroke-linecap="round"/></svg>
            <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" />
          </div>
        </div>
        <button type="submit" class="btn-primary" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="btn-loading">
            <div class="dot-loader"><span></span><span></span><span></span></div>
            Signing in...
          </span>
        </button>
        <div *ngIf="errorMessage" class="error-msg">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#ef4444" stroke-width="1.5"/><path d="M8 5v3M8 10h.01" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/></svg>
          {{ errorMessage }}
        </div>
      </form>
    </div>
  </div>
</div>
